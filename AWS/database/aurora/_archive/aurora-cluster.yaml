# ============================================================
# Aurora Serverless v2 — 클러스터 및 인스턴스 설정
# 멀티모달 임상 의사결정 지원 시스템 (응급 의료 AI)
#
# 같은 클러스터에 2개 DB 운영:
#   - drai_ops: 운영 DB (AI 추론 결과, 소견서, 이벤트 로그)
#   - hapi: HAPI FHIR 서버 전용 DB (환자 정보, 바이탈, 검사 결과)
# ============================================================

# ── 공통 Parameters (CloudFormation 변환 시 사용) ──────────
parameters:
  ProjectName:
    type: String
    default: say2-6team
  Environment:
    type: String
    default: dev
    allowed_values: [dev, staging, prod]
  Owner:
    type: String
    default: hkt
    allowed_values: [unassigned, wja, lji, hkt, yji]

# ── 공통 Tags (모든 리소스에 적용) ─────────────────────────
common_tags:
  - Key: Project
    Value: "!Ref ProjectName"    # say2-6team
  - Key: Environment
    Value: "!Ref Environment"    # dev / staging / prod
  - Key: Owner
    Value: "!Ref Owner"          # yji

# ============================================================

cluster:
  name: say2-6team-aurora-cluster
  engine: aurora-postgresql
  engine_version: "16.4"
  master_username: admin
  # master_password는 AWS Secrets Manager에서 관리
  secrets_manager_arn: arn:aws:secretsmanager:ap-northeast-2:ACCOUNT_ID:secret:say2-6team/aurora-credentials

  databases:
    - name: drai_ops
      description: "운영 DB — AI 추론 결과, 소견서, WebSocket 이벤트"
    - name: hapi
      description: "HAPI FHIR 서버 전용 DB — 환자/바이탈/검사 FHIR 리소스"

  serverless_v2:
    min_acu: 0.5        # 트래픽 없을 때 최소 (비용 절감)
    max_acu: 4.0        # 피크 시 최대 (응급 상황 대응)

  vpc:
    subnet_group: say2-6team-data-subnet-group
    subnets:
      - say2-6team-private-data-subnet-a
      - say2-6team-private-data-subnet-c
    security_group: say2-6team-aurora-sg
    ingress_rules:
      - source: say2-6team-central-sg
        port: 5432
        description: "중앙백엔드 (FastAPI) → Aurora"
      - source: say2-6team-hapi-sg
        port: 5432
        description: "HAPI FHIR 서버 → Aurora (hapi DB)"

  encryption:
    enabled: true
    kms_key: alias/say2-6team-aurora-kms

  backup:
    retention_days: 7
    preferred_window: "03:00-04:00"    # KST 12:00-13:00

  monitoring:
    enhanced_monitoring: true
    monitoring_interval: 60            # 초
    cloudwatch_logs:
      - postgresql

  tags:
    - Key: Project
      Value: "!Ref ProjectName"
    - Key: Environment
      Value: "!Ref Environment"
    - Key: Owner
      Value: "!Ref Owner"

instances:
  - identifier: say2-6team-writer
    instance_class: db.serverless
    promotion_tier: 0                  # Primary writer

  - identifier: say2-6team-reader
    instance_class: db.serverless
    promotion_tier: 1                  # Read replica (고가용성)
