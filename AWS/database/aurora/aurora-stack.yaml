AWSTemplateFormatVersion: "2010-09-09"
Description: >
  say2-6team Aurora Serverless v2 stack - PostgreSQL 16 cluster with
  KMS encryption, Secrets Manager rotation, writer + reader instances.
  Hosts two logical databases: central_db (operations - AI results, reports, events)
  and hapi (FHIR R4 - dedicated to HAPI server).

  Depends on: network-stack (private data subnets, VPC). Imported via ImportValue.
  After deployment, run the SQL in migrations.yaml via RDS Data API or ECS Task
  to create the 6 operational tables.

Metadata:
  Project:
    Name: say2-6team
    Purpose: Aurora Serverless v2 for emergency multimodal AI orchestrator
  Dependencies:
    - network-stack (must be deployed first - exports VPC + private data subnets)
  Notes:
    - Master password is auto-generated by Secrets Manager (no plaintext in code).
    - 30-day automatic rotation uses the AWS-managed PostgreSQLSingleUser template
      (creates the rotation Lambda internally - no custom Lambda needed).
    - IAM Database Authentication enabled; ECS tasks can authenticate via IAM role
      without ever loading the master password.
    - Storage encrypted with customer-managed KMS key (separate from default RDS key
      for audit clarity and HIPAA alignment).

# ============================================================================
Parameters:
# ============================================================================
  ProjectName:
    Type: String
    Default: say2-6team
    Description: Project prefix used for resource naming and tags.

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment.

  Owner:
    Type: String
    Default: yji
    AllowedValues: [unassigned, wja, lji, hkt, yji]
    Description: Resource owner tag value.

  EngineVersion:
    Type: String
    Default: "16.4"
    Description: Aurora PostgreSQL engine version (Serverless v2 compatible).

  MasterUsername:
    Type: String
    Default: dbadmin
    MinLength: 1
    MaxLength: 16
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9_]*$"
    Description: Master database user (DDL/admin only - not used by app code).

  MinAcu:
    Type: Number
    Default: 0.5
    MinValue: 0.5
    MaxValue: 128
    Description: Aurora Serverless v2 minimum capacity (ACU) - idle floor.

  MaxAcu:
    Type: Number
    Default: 4.0
    MinValue: 1
    MaxValue: 128
    Description: Aurora Serverless v2 maximum capacity (ACU) - peak ceiling.

  BackupRetentionDays:
    Type: Number
    Default: 7
    MinValue: 1
    MaxValue: 35
    Description: Automated backup retention period.

  PreferredBackupWindow:
    Type: String
    Default: "03:00-04:00"
    Description: Daily backup window in UTC (UTC 03-04 = KST 12-13, low ER traffic during lunch hour).

  EnableRotation:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >
      Reserved for future use. Rotation is currently disabled for dev.

# ============================================================================
Conditions:
# ============================================================================
  RotationEnabled: !Equals [!Ref EnableRotation, "true"]

# ============================================================================
Resources:
# ============================================================================

  # ===========================================================
  # 1. KMS - Aurora disk encryption key (customer-managed)
  # ===========================================================
  AuroraKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "${ProjectName} Aurora encryption key (at-rest)"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowRootAccount
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Sid: AllowRdsService
            Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey*
              - kms:CreateGrant
              - kms:DescribeKey
            Resource: "*"
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner

  AuroraKmsAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${ProjectName}-aurora-kms"
      TargetKeyId: !Ref AuroraKmsKey

  # ===========================================================
  # 2. Secrets Manager - master credentials (auto-generated password)
  # ===========================================================
  AuroraMasterSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${ProjectName}/aurora-credentials"
      Description: "Aurora cluster master credentials (auto-rotated 30d)"
      KmsKeyId: !Ref AuroraKmsKey
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username":"${MasterUsername}"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\\'
        ExcludePunctuation: false
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner

  # ===========================================================
  # 3. NOTE: Aurora Security Group is managed by security-stack.
  #    Imported via: !ImportValue say2-6team-aurora-sg
  #    aurora-stack does NOT create its own SG to avoid conflicts.
  # ===========================================================

  # ===========================================================
  # 4. DB Subnet Group - 2 private data subnets across AZ-a/AZ-c
  # ===========================================================
  AuroraSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Sub "${ProjectName}-aurora-subnet-group"
      DBSubnetGroupDescription: "Aurora cluster subnet group - data tier across 2 AZ"
      SubnetIds:
        - Fn::ImportValue: !Sub "${ProjectName}-private-data-subnet-a"
        - Fn::ImportValue: !Sub "${ProjectName}-private-data-subnet-c"
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner

  # ===========================================================
  # 5. DB Cluster Parameter Group - pgaudit + ssl enforcement
  # ===========================================================
  AuroraClusterParamGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: !Sub "${ProjectName} Aurora cluster params - pgaudit, ssl required"
      Family: aurora-postgresql16
      Parameters:
        # Enforce client TLS
        rds.force_ssl: "1"
        # Audit logging (HIPAA 6-year retention)
        shared_preload_libraries: pgaudit
        pgaudit.log: "write,ddl"
        pgaudit.log_catalog: "0"
        pgaudit.log_parameter: "1"
        # Slow query logging
        log_min_duration_statement: "1000"
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner

  # ===========================================================
  # 6. Aurora DB Cluster - Serverless v2 (PostgreSQL 16)
  # ===========================================================
  AuroraCluster:
    Type: AWS::RDS::DBCluster
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBClusterIdentifier: !Sub "${ProjectName}-aurora-cluster"
      Engine: aurora-postgresql
      EngineVersion: !Ref EngineVersion
      EngineMode: provisioned       # Serverless v2 uses 'provisioned' + ServerlessV2ScalingConfiguration
      DatabaseName: central_db       # Operations DB. hapi is created via migration SQL with CREATE DATABASE
      MasterUsername: !Sub "{{resolve:secretsmanager:${AuroraMasterSecret}::username}}"
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${AuroraMasterSecret}::password}}"

      DBSubnetGroupName: !Ref AuroraSubnetGroup
      VpcSecurityGroupIds:
        - !ImportValue say2-6team-aurora-sg
      DBClusterParameterGroupName: !Ref AuroraClusterParamGroup

      Port: 5432
      StorageEncrypted: true
      KmsKeyId: !Ref AuroraKmsKey

      EnableIAMDatabaseAuthentication: true   # IAM Role-based access (for app layer)
      EnableHttpEndpoint: true                 # RDS Data API (for running migrations)

      BackupRetentionPeriod: !Ref BackupRetentionDays
      PreferredBackupWindow: !Ref PreferredBackupWindow
      PreferredMaintenanceWindow: "sun:04:00-sun:05:00"   # UTC (KST Sun 13:00-14:00)
      DeletionProtection: true
      CopyTagsToSnapshot: true

      EnableCloudwatchLogsExports:
        - postgresql

      ServerlessV2ScalingConfiguration:
        MinCapacity: !Ref MinAcu
        MaxCapacity: !Ref MaxAcu

      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-aurora-cluster"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner

  # Secrets Manager <-> Cluster link (so rotation lambda knows which cluster to target)
  AuroraSecretAttachment:
    Type: AWS::SecretsManager::SecretTargetAttachment
    Properties:
      SecretId: !Ref AuroraMasterSecret
      TargetId: !Ref AuroraCluster
      TargetType: AWS::RDS::DBCluster

  # ===========================================================
  # 7. Rotation - disabled for dev
  #    NOTE: To enable rotation later, add AWS::SecretsManager::RotationSchedule
  #    with a custom rotation Lambda or use the console.
  # ===========================================================

  # ===========================================================
  # 8. Writer instance (Primary)
  # ===========================================================
  AuroraWriterInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub "${ProjectName}-aurora-writer"
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.serverless    # Aurora Serverless v2
      Engine: aurora-postgresql
      PromotionTier: 0                  # Primary
      PubliclyAccessible: false
      EnablePerformanceInsights: true
      PerformanceInsightsKMSKeyId: !Ref AuroraKmsKey
      PerformanceInsightsRetentionPeriod: 7
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-aurora-writer"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner

  # ===========================================================
  # 9. Reader instance (Replica, high availability)
  # ===========================================================
  AuroraReaderInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub "${ProjectName}-aurora-reader"
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.serverless
      Engine: aurora-postgresql
      PromotionTier: 1                  # Failover candidate when writer goes down
      PubliclyAccessible: false
      EnablePerformanceInsights: true
      PerformanceInsightsKMSKeyId: !Ref AuroraKmsKey
      PerformanceInsightsRetentionPeriod: 7
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-aurora-reader"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner

# ============================================================================
Outputs:
# ============================================================================
  ClusterEndpoint:
    Description: Aurora cluster writer endpoint (DNS)
    Value: !GetAtt AuroraCluster.Endpoint.Address
    Export:
      Name: !Sub "${ProjectName}-aurora-endpoint"

  ClusterReadEndpoint:
    Description: Aurora cluster reader endpoint (load-balanced reads)
    Value: !GetAtt AuroraCluster.ReadEndpoint.Address
    Export:
      Name: !Sub "${ProjectName}-aurora-read-endpoint"

  ClusterPort:
    Description: Aurora cluster port (5432)
    Value: !GetAtt AuroraCluster.Endpoint.Port
    Export:
      Name: !Sub "${ProjectName}-aurora-port"

  ClusterIdentifier:
    Description: Aurora cluster identifier - used by CloudWatch alarms
    Value: !Ref AuroraCluster
    Export:
      Name: !Sub "${ProjectName}-aurora-cluster-id"

  ClusterArn:
    Description: Aurora cluster ARN - used by Data API + IAM policies
    Value: !Sub "arn:aws:rds:${AWS::Region}:${AWS::AccountId}:cluster:${AuroraCluster}"
    Export:
      Name: !Sub "${ProjectName}-aurora-cluster-arn"

  MasterSecretArn:
    Description: Secrets Manager ARN holding master credentials
    Value: !Ref AuroraMasterSecret
    Export:
      Name: !Sub "${ProjectName}-aurora-secret-arn"

  SecurityGroupId:
    Description: Aurora SG ID (managed by security-stack)
    Value: !ImportValue say2-6team-aurora-sg
    Export:
      Name: !Sub "${ProjectName}-aurora-sg-id"

  KmsKeyArn:
    Description: KMS key ARN for Aurora encryption
    Value: !GetAtt AuroraKmsKey.Arn
    Export:
      Name: !Sub "${ProjectName}-aurora-kms-arn"
