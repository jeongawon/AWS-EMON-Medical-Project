AWSTemplateFormatVersion: "2010-09-09"
Description: >
  say2-6team Data-RAG stack - S3 bucket for RAG DB, ECR repository,
  ECS Task Definition, ECS Service, and Cloud Map service registration.
  Deploy in ap-northeast-2.

Metadata:
  Project:
    Name: say2-6team
    Purpose: RAG service infrastructure for clinical opinion generation
  Notes:
    - ChromaDB runs inside the RAG container as PersistentClient (file mode).
    - No separate ChromaDB server/sidecar needed.
    - Task downloads DB from S3 at startup (~372MB, ~30s).
    - DB updates are done offline (6-month cycle) and re-uploaded to S3.
    - ECSClusterArn parameter is PENDING until compute-stack provides it.
    - RAG service is responsible for the complete diagnostic report generation workflow.
    - RAG receives modal results and patient context from orchestrator/router.
    - RAG generates retrieval query, calls Bedrock for embedding, searches ChromaDB for Top-K similar cases.
    - RAG assembles final prompt, calls Bedrock for clinical opinion generation, stores report in Aurora PostgreSQL.
    - RAG returns final opinion and storage status.
    - Central Orchestrator handles modal orchestration and forwards prepared input to RAG /generate endpoint.
    - RAG TaskDefinition includes DB connection secrets (DB_HOST, DB_USERNAME, DB_PASSWORD) for Aurora access.

Parameters:
  ProjectName:
    Type: String
    Default: say2-6team
    Description: Project prefix for naming and tags.

  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment.

  Owner:
    Type: String
    Default: yji
    AllowedValues:
      - unassigned
      - wja
      - lji
      - hkt
      - yji
    Description: Resource owner tag value.

  ECSClusterArn:
    Type: String
    Default: "PENDING-FROM-COMPUTE-STACK"
    Description: >
      ECS Cluster ARN from compute-stack.
      Update this parameter after lji provides the Cluster ARN.
      Run: aws cloudformation update-stack --parameters ParameterKey=ECSClusterArn,ParameterValue=<actual-arn>

  RAGContainerImage:
    Type: String
    Default: "PENDING-ECR-IMAGE-URI"
    Description: >
      RAG API container image URI (ECR).
      Update after building and pushing the Docker image.

  RAGDBBucketName:
    Type: String
    Default: "say2-6team-rag-db-666803869796"
    Description: >
      Existing S3 bucket name for RAG ChromaDB files.
      This bucket was created outside this stack.

  RAGTaskCpu:
    Type: String
    Default: "512"
    AllowedValues:
      - "256"
      - "512"
      - "1024"
    Description: Fargate task CPU units (512 = 0.5 vCPU).

  RAGTaskMemory:
    Type: String
    Default: "1024"
    AllowedValues:
      - "512"
      - "1024"
      - "2048"
    Description: Fargate task memory in MB.

Conditions:
  ClusterReady: !Not [!Equals [!Ref ECSClusterArn, "PENDING-FROM-COMPUTE-STACK"]]
  ImageReady: !Not [!Equals [!Ref RAGContainerImage, "PENDING-ECR-IMAGE-URI"]]
  CanDeployService: !And
    - !Condition ClusterReady
    - !Condition ImageReady

Resources:
  ###########################################################################
  # S3 Bucket - RAG DB Storage (already exists, referenced by parameter)
  ###########################################################################

  ###########################################################################
  # ECR Repository - RAG API Image (already exists outside this stack)
  ###########################################################################

  ###########################################################################
  # ECS Task Definition - RAG API (read-only ChromaDB inside)
  ###########################################################################
  RAGTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Condition: ImageReady
    Properties:
      Family: !Sub "${ProjectName}-rag-task"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: !Ref RAGTaskCpu
      Memory: !Ref RAGTaskMemory
      ExecutionRoleArn: !ImportValue say2-6team-ecs-execution-role-arn
      TaskRoleArn: !ImportValue say2-6team-rag-task-role-arn
      ContainerDefinitions:
        - Name: rag-api
          Image: !Ref RAGContainerImage
          Essential: true
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp

          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:8000/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 120
            
          Environment:
            - Name: CHROMA_MODE
              Value: local
            - Name: CHROMA_DB_DIR
              Value: ./local_rag_db
            - Name: RAG_DB_BUCKET
              Value: !Ref RAGDBBucketName
            - Name: EMBED_CACHE_ENABLED
              Value: "false"
            - Name: AWS_DEFAULT_REGION
              Value: !Ref AWS::Region
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: DB_NAME
              Value: central_db
            - Name: DB_PORT
              Value: "5432"
            - Name: DB_POOL_MIN
              Value: "1"
            - Name: DB_POOL_MAX
              Value: "5"
          Secrets:
            - Name: DB_HOST
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/aurora-credentials:host::"
            - Name: DB_USERNAME
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/aurora-credentials:username::"
            - Name: DB_PASSWORD
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/aurora-credentials:password::"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub "/ecs/${ProjectName}-rag"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: rag-api
              awslogs-create-group: "true"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-rag-task"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Owner
          Value: !Ref Owner
        - Key: Environment
          Value: !Ref Environment

  ###########################################################################
  # Cloud Map Service - RAG Service Discovery
  ###########################################################################
  RAGCloudMapService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: rag-svc
      NamespaceId: !ImportValue say2-6team-cloud-map-namespace-id
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 60
      HealthCheckCustomConfig:
        FailureThreshold: 1
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-rag-svc"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Owner
          Value: !Ref Owner
        - Key: Environment
          Value: !Ref Environment

  ###########################################################################
  # ECS Service - RAG Fargate Service
  ###########################################################################
  RAGService:
    Type: AWS::ECS::Service
    Condition: CanDeployService
    Properties:
      ServiceName: !Sub "${ProjectName}-rag-svc"
      Cluster: !Ref ECSClusterArn
      TaskDefinition: !Ref RAGTaskDefinition
      DesiredCount: 2
      LaunchType: FARGATE
      # Fargate는 PlacementStrategies를 지원하지 않음
      # 대신 여러 서브넷 지정 시 AWS가 자동으로 AZ 분산 배치
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !ImportValue say2-6team-private-app-subnet-a
            - !ImportValue say2-6team-private-app-subnet-c
          SecurityGroups:
            - !ImportValue say2-6team-rag-sg
      ServiceRegistries:
        - RegistryArn: !GetAtt RAGCloudMapService.Arn
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-rag-svc"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Owner
          Value: !Ref Owner
        - Key: Environment
          Value: !Ref Environment

Outputs:
  RAGDBBucketName:
    Description: S3 bucket for RAG ChromaDB files
    Value: !Ref RAGDBBucketName
    Export:
      Name: !Sub "${ProjectName}-rag-db-bucket"

  RAGECRRepositoryUri:
    Description: ECR repository URI for RAG API image
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectName}-rag-api"
    Export:
      Name: !Sub "${ProjectName}-rag-ecr-uri"

  RAGCloudMapServiceArn:
    Description: Cloud Map service ARN for RAG
    Value: !GetAtt RAGCloudMapService.Arn

  RAGServiceDNS:
    Description: DNS name for RAG service (use from orchestrator)
    Value: !Sub "rag-svc.${ProjectName}.local"
