# ============================================================
# CloudWatch Alarms — 인프라 운영팀용 이상 감지 알림 (SNS → 이메일)
#
# [범위 명확화]
# 이 파일은 *인프라* 알람만 다룬다 (Aurora / ECS / ALB 헬스 + 모달 에러 카운트).
# 의사·응급실 임상 알람 (CRITICAL 환자 감지, STEMI 패턴 등)은
# CloudWatch가 아닌 *백엔드 코드가 직접 FCM/WebSocket으로 푸시* 한다.
#
# 이유: 응급실 의사는 이메일을 안 봄. 임상 알림은 앱 푸시 1~3초 지연이 필수.
#
# 알람 분류:
#   1. Aurora DB 알람    — CPU, ACU, 연결 수, 메모리
#   2. ECS 서비스 알람   — 중앙백엔드 CPU/메모리/태스크 수
#   3. 모달 추론 인프라 — 에러 카운트, 지연 (* 임상 의미 아님, DevOps 모니터링)
#   4. ALB 알람          — 5xx 에러, 응답 시간, Unhealthy 타겟
#
# 알림 채널 (모두 SNS → 이메일):
#   - say2-6team-critical-alerts : 즉시 대응 필요 → CriticalAlertEmail
#   - say2-6team-warning-alerts  : 주의 필요 → WarningAlertEmail
#
# 임상 알람은 어디에?
#   백엔드 `fcm_dispatcher` (TODO 신규)가 device_tokens 테이블의 의사 토큰들에
#   FCM/APNs로 직접 발송. CloudWatch 거치지 않음.
#   참고: 의료법상 SLA 짧음 (CRITICAL 응답시간) — 푸시 1~3초 vs 이메일 30~60초
#
# 연관 파일:
#   - cloudwatch.yaml  : 알람이 참조하는 메트릭 정의 (인프라 메트릭만)
#   - eventbridge.yaml : AWS 이벤트 기반 알림 (Phase 2 보류)
# ============================================================

# ── 공통 Parameters ────────────────────────────────────────
parameters:
  ProjectName:
    type: String
    default: say2-6team
  Environment:
    type: String
    default: dev
    allowed_values: [dev, staging, prod]
  Owner:
    type: String
    default: hkt
    allowed_values: [unassigned, wja, lji, hkt, yji]

  # 알림 받을 이메일 — 배포 시 stack 파라미터로 override
  CriticalAlertEmail:
    type: String
    default: oncall-team@hospital.co.kr
    description: "CRITICAL 인프라 알람 수신 이메일 (운영팀)"
  WarningAlertEmail:
    type: String
    default: dev-team@hospital.co.kr
    description: "WARNING 인프라 알람 수신 이메일 (개발팀)"

common_tags:
  - Key: Project
    Value: "!Ref ProjectName"
  - Key: Environment
    Value: "!Ref Environment"
  - Key: Owner
    Value: "!Ref Owner"


# ── SNS Topics — 이메일만 (Slack 제거) ────────────────────
sns_topics:

  - name: say2-6team-critical-alerts
    description: "CRITICAL 인프라 알람 — 즉시 대응 필요 (이메일)"
    subscriptions:
      - protocol: email
        endpoint: "!Ref CriticalAlertEmail"

  - name: say2-6team-warning-alerts
    description: "WARNING 인프라 알람 — 주의 필요 (이메일)"
    subscriptions:
      - protocol: email
        endpoint: "!Ref WarningAlertEmail"


# ──────────────────────────────────────────────────────────
# 1. Aurora DB 알람
# ──────────────────────────────────────────────────────────
alarms:

  # Aurora CPU 과부하
  - name: Aurora-CPU-High
    description: "Aurora CPU 사용률 80% 초과 (5분 지속)"
    namespace: AWS/RDS
    metric: CPUUtilization
    dimensions:
      DBClusterIdentifier: say2-6team-aurora-cluster
    statistic: Average
    period: 300
    threshold: 80
    comparison: GreaterThanThreshold
    evaluation_periods: 2
    actions:
      alarm: say2-6team-warning-alerts
      ok: say2-6team-warning-alerts

  # Aurora ACU 최대치 도달
  - name: Aurora-ACU-Max
    description: "Aurora ACU가 max_acu(4.0)의 90%에 도달"
    namespace: AWS/RDS
    metric: ServerlessDatabaseCapacity
    dimensions:
      DBClusterIdentifier: say2-6team-aurora-cluster
    statistic: Average
    period: 300
    threshold: 3.6    # max_acu 4.0의 90%
    comparison: GreaterThanThreshold
    evaluation_periods: 3
    actions:
      alarm: say2-6team-critical-alerts

  # Aurora 연결 수 과다
  - name: Aurora-Connections-High
    description: "DB 연결 수 100개 초과"
    namespace: AWS/RDS
    metric: DatabaseConnections
    dimensions:
      DBClusterIdentifier: say2-6team-aurora-cluster
    statistic: Maximum
    period: 300
    threshold: 100
    comparison: GreaterThanThreshold
    evaluation_periods: 2
    actions:
      alarm: say2-6team-warning-alerts

  # Aurora 여유 메모리 부족
  - name: Aurora-FreeableMemory-Low
    description: "Aurora 여유 메모리 256MB 미만"
    namespace: AWS/RDS
    metric: FreeableMemory
    dimensions:
      DBClusterIdentifier: say2-6team-aurora-cluster
    statistic: Minimum
    period: 300
    threshold: 268435456    # 256MB in bytes
    comparison: LessThanThreshold
    evaluation_periods: 2
    actions:
      alarm: say2-6team-critical-alerts

  # ──────────────────────────────────────────────────────────
  # 2. ECS 서비스 알람 (중앙백엔드)
  # ──────────────────────────────────────────────────────────

  - name: Backend-CPU-High
    description: "중앙백엔드 ECS CPU 80% 초과"
    namespace: AWS/ECS
    metric: CPUUtilization
    dimensions:
      ClusterName: say2-6team-ecs-cluster
      ServiceName: central-backend
    statistic: Average
    period: 300
    threshold: 80
    comparison: GreaterThanThreshold
    evaluation_periods: 2
    actions:
      alarm: say2-6team-warning-alerts

  - name: Backend-Memory-High
    description: "중앙백엔드 ECS 메모리 85% 초과"
    namespace: AWS/ECS
    metric: MemoryUtilization
    dimensions:
      ClusterName: say2-6team-ecs-cluster
      ServiceName: central-backend
    statistic: Average
    period: 300
    threshold: 85
    comparison: GreaterThanThreshold
    evaluation_periods: 2
    actions:
      alarm: say2-6team-warning-alerts

  - name: Backend-Task-Unhealthy
    description: "중앙백엔드 Running Task 0개 (서비스 다운)"
    namespace: AWS/ECS
    metric: RunningTaskCount
    dimensions:
      ClusterName: say2-6team-ecs-cluster
      ServiceName: central-backend
    statistic: Minimum
    period: 60
    threshold: 1
    comparison: LessThanThreshold
    evaluation_periods: 2
    actions:
      alarm: say2-6team-critical-alerts

  # ──────────────────────────────────────────────────────────
  # 3. 모달 추론 인프라 알람 (* 임상 의미 아님, DevOps용)
  #
  # 모달 서비스가 자주 죽으면 운영팀이 알아야 함. 단 의사에게는 알리지 않음
  # (의사는 어차피 다른 모달 결과 + WebSocket으로 "분석 실패"는 즉시 알림).
  # 임상 의사용 알림은 *backend의 FCM 디스패처*가 별도로 처리.
  # ──────────────────────────────────────────────────────────

  - name: Modal-Inference-Error-Spike
    description: "모달 추론 에러 5분간 3회 이상 — 운영팀 확인 필요 (인프라)"
    namespace: DRAI/Modal
    metric: InferenceErrorCount
    statistic: Sum
    period: 300
    threshold: 3
    comparison: GreaterThanOrEqualToThreshold
    evaluation_periods: 1
    actions:
      alarm: say2-6team-critical-alerts

  - name: High-Latency-Spike
    description: "추론 지연(5초 초과) 5분간 5회 이상 — 성능 저하"
    namespace: DRAI/Modal
    metric: HighLatencyCount
    statistic: Sum
    period: 300
    threshold: 5
    comparison: GreaterThanOrEqualToThreshold
    evaluation_periods: 1
    actions:
      alarm: say2-6team-warning-alerts

  # 🚫 임상 알람은 이 파일에서 제거 (이메일 알림 부적합)
  #
  # 옛 알람 (제거됨):
  #   - Critical-Risk-Detected: CRITICAL 위험도 환자 감지
  #     → 백엔드 fcm_dispatcher.py가 device_tokens.list_active_for_user()로
  #       의사 폰에 FCM 직접 발송. WebSocket으로도 PC 브라우저 즉시 푸시.
  #
  # 이유: 응급실 의사는 이메일 안 봄. 임상 알림은 푸시 1~3초 SLA 필수.

  # ──────────────────────────────────────────────────────────
  # 4. ALB 알람
  # ──────────────────────────────────────────────────────────

  - name: ALB-5xx-High
    description: "ALB 5xx 에러 5분간 10회 초과"
    namespace: AWS/ApplicationELB
    metric: HTTPCode_ELB_5XX_Count
    dimensions:
      LoadBalancer: say2-6team-alb
    statistic: Sum
    period: 300
    threshold: 10
    comparison: GreaterThanThreshold
    evaluation_periods: 1
    actions:
      alarm: say2-6team-critical-alerts

  - name: ALB-TargetResponseTime-High
    description: "ALB 평균 응답 시간 3초 초과"
    namespace: AWS/ApplicationELB
    metric: TargetResponseTime
    dimensions:
      LoadBalancer: say2-6team-alb
    statistic: Average
    period: 300
    threshold: 3
    comparison: GreaterThanThreshold
    evaluation_periods: 2
    actions:
      alarm: say2-6team-warning-alerts

  - name: ALB-UnhealthyHost
    description: "ALB 뒤 Unhealthy 타겟 존재"
    namespace: AWS/ApplicationELB
    metric: UnHealthyHostCount
    dimensions:
      LoadBalancer: say2-6team-alb
      TargetGroup: say2-6team-backend-tg
    statistic: Maximum
    period: 60
    threshold: 1
    comparison: GreaterThanOrEqualToThreshold
    evaluation_periods: 2
    actions:
      alarm: say2-6team-critical-alerts
