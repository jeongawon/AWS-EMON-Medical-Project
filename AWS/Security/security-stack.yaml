  ###########################################################################
  # WAF (Regional - direct ALB attachment)
  #
  # Scope=REGIONAL deployed in ap-northeast-2 (no CloudFront).
  # ALB ARN is associated via WebACLAssociation after compute-stack deploy.
  # All rules are in Count mode during dev (observe only, no blocking).
  ###########################################################################
  RegionalWebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub "${ProjectName}-alb-waf"
      Description: !Sub "${ProjectName} regional WAF for ALB"
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${ProjectName}-alb-waf"
        SampledRequestsEnabled: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-alb-waf"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Owner
          Value: !Ref Owner
        - Key: Environment
          Value: !Ref Environment
      Rules:
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 10
          OverrideAction:
            Count: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: AWSManagedRulesCommonRuleSet
            SampledRequestsEnabled: true
        - Name: AWSManagedRulesKnownBadInputsRuleSet
          Priority: 20
          OverrideAction:
            Count: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: AWSManagedRulesKnownBadInputsRuleSet
            SampledRequestsEnabled: true
        - Name: AWSManagedRulesAmazonIpReputationList
          Priority: 30
          OverrideAction:
            Count: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: AWSManagedRulesAmazonIpReputationList
            SampledRequestsEnabled: true
        - Name: RateLimitPerIP
          Priority: 100
          Action:
            Count: {}
          Statement:
            RateBasedStatement:
              Limit: !Ref RateLimitPerFiveMinutes
              AggregateKeyType: IP
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: RateLimitPerIP
            SampledRequestsEnabled: true

  ###########################################################################
  # Cognito
  #
  # 변경 이력:
  #   - v1: email 기반 로그인 (초기 placeholder)
  #   - v2 (현재): 사번(username) 기반 로그인, email은 alias (복구용)
  #
  # 설계 의도:
  #   - 의사/간호사가 사번(DR001, NR001 등)으로 로그인
  #   - email은 AliasAttributes로 유지 (계정 복구, 알림용)
  #   - AdminCreateUserOnly: true → 관리자가 사번으로 사용자 생성
  #   - custom:role 속성 추가 → 향후 SSO/SAML IdP 연동 시 역할 매핑 용이
  #
  # SSO 확장 계획:
  #   - 병원 SSO(SAML 2.0) 연동 시:
  #     1. AWS::Cognito::UserPoolIdentityProvider (SAML type) 리소스 추가
  #     2. SupportedIdentityProviders에 해당 IdP 추가
  #     3. AttributeMapping으로 사번/역할 자동 매핑
  #   - Google/외부 IdP 연동 시:
  #     1. AWS::Cognito::UserPoolIdentityProvider (OIDC type) 리소스 추가
  #     2. SupportedIdentityProviders에 Google 추가
  #   - 현재 구조에서 IdP 추가만으로 SSO 전환 가능 (Pool 재생성 불필요)
  ###########################################################################
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${ProjectName}-user-pool"
      # UsernameAttributes 제거 — username을 사번(DR001, NR001)으로 직접 사용
      AliasAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Schema:
        - Name: name
          AttributeDataType: String
          Mutable: true
          Required: false
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
        # SSO 연동 시 IdP에서 전달받을 역할 속성 (doctor, nurse, admin 등)
        - Name: custom:role
          AttributeDataType: String
          Mutable: true
          Required: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
        InviteMessageTemplate:
          EmailSubject: !Sub "[${ProjectName}] 계정이 생성되었습니다"
          EmailMessage: "사번: {username}, 임시 비밀번호: {####}\n첫 로그인 시 비밀번호를 변경해주세요."
      UserPoolTags:
        Project: !Ref ProjectName
        Owner: !Ref Owner
        Environment: !Ref Environment

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${ProjectName}-web-client"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        # 관리자가 사번+임시비밀번호로 사용자 생성 후 초기 로그인 지원
        - ALLOW_ADMIN_USER_PASSWORD_AUTH
      SupportedIdentityProviders:
        - COGNITO
        # SSO 추가 시 여기에 IdP name 추가 (예: "Google", "HospitalSAML")
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      CallbackURLs:
        - !Ref CognitoCallbackUrl
      LogoutURLs:
        - !Ref CognitoLogoutUrl
      # SSO 추가 시 토큰 유효 시간 조정 가능
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "${ProjectName}-${Environment}-${AWS::AccountId}-auth"
      UserPoolId: !Ref CognitoUserPool

