AWSTemplateFormatVersion: "2010-09-09"
Description: >
  say2-6team regional security stack - KMS, Security Groups, IAM Roles,
  Cognito baseline, and security-related exports.
  Deploy this stack in ap-northeast-2.

Metadata:
  Project:
    Name: say2-6team
    Purpose: Regional security baseline for ER multimodal AI system
  Notes:
    - This stack depends on network-stack exports.
    - Endpoint SG is already created by network-stack and must not be duplicated here.
    - Custom NACLs are intentionally excluded from this version.
    - Secrets Manager Secret resources are intentionally not created in this stack.
    - Aurora/DB Secret should be created by data-stack and later exported.
    - IAM policies use project-prefix wildcards during dev and should be tightened after data-stack exports exact ARNs.
    - Cognito is included as a baseline, but callback/logout URLs are placeholders until the frontend/CloudFront domain is finalized.
    - RAG service is responsible for RAG search, pre/post processing, prompting, and Bedrock invocation for automated narrative generation.
    - RAG service writes the generated narrative to Aurora PostgreSQL.
    - Modal services (ECG, CXR, LAB) write their own inference results directly to Aurora PostgreSQL.
    - Orchestrator handles patient request intake, modal orchestration via Cloud Map, and final coordination. When orchestrator is healthy, it calls modal services directly via Cloud Map DNS.
    - Router service is a stateless routing layer. When orchestrator is down, router handles direct modal calls from physicians and assembles context for RAG. Router does not perform judgment or DB write.
    - Modal services (ECG, CXR, LAB) are internal-only and are not attached to the ALB. They are accessible only via Cloud Map DNS from orchestrator or router-svc.

Parameters:
  ProjectName:
    Type: String
    Default: say2-6team
    Description: Project prefix used for resource naming, exports, and tags.

  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment.

  Owner:
    Type: String
    Default: yji
    AllowedValues:
      - unassigned
      - wja
      - lji
      - hkt
      - yji
    Description: Resource owner tag value.

  CognitoCallbackUrl:
    Type: String
    Default: http://localhost:3000/callback
    Description: >
      Temporary callback URL for Cognito Hosted UI/OAuth.
      Update this after the CloudFront/custom frontend domain is finalized.

  CognitoLogoutUrl:
    Type: String
    Default: http://localhost:3000/logout
    Description: >
      Temporary logout URL for Cognito Hosted UI/OAuth.
      Update this after the CloudFront/custom frontend domain is finalized.

  RateLimitPerFiveMinutes:
    Type: Number
    Default: 2000
    MinValue: 100
    Description: >
      WAF rate limit per IP per 5 minutes.
      Current rule is Count mode in dev. Change Action to Block after validation.

Resources:
  ###########################################################################
  # KMS
  ###########################################################################
  ProjectKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "${ProjectName} common KMS key"
      EnableKeyRotation: true
      PendingWindowInDays: 7
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableAccountLevelKMSAdministration
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-kms-key"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Owner
          Value: !Ref Owner
        - Key: Environment
          Value: !Ref Environment

  ProjectKmsAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${ProjectName}-kms-key"
      TargetKeyId: !Ref ProjectKmsKey

  ###########################################################################
  # Security Groups
  #
  # Responsibility split:
  #   - Orchestrator calls modal services via Cloud Map and collects results.
  #   - Orchestrator passes assembled context to RAG /generate.
  #   - RAG service performs embedding, ChromaDB search, prompting,
  #     and Bedrock invocation for automated narrative generation.
  #   - Modal services (ECG, CXR, LAB) write their own inference results
  #     directly to Aurora PostgreSQL.
  #
  # ChromaDB:
  #   - ChromaDB/Vector DB is embedded inside the RAG container (file mode).
  #   - chroma-sg is reserved for future external ChromaDB if needed.
  #
  # Router:
  #   - Stateless fallback routing layer (port 8004).
  #   - When orchestrator is down, router handles direct modal calls and
  #     assembles context for RAG. Router does not perform judgment or DB write.
  #
  # NACLs:
  #   - Not included in this version.
  ###########################################################################
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${ProjectName}-alb-sg"
      GroupDescription: Security group for ALB
      VpcId: !ImportValue say2-6team-vpc-id
      SecurityGroupEgress: []
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-alb-sg"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Owner
          Value: !Ref Owner
        - Key: Environment
          Value: !Ref Environment

  CentralSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${ProjectName}-central-sg"
      GroupDescription: Security group for ECS orchestrator service
      VpcId: !ImportValue say2-6team-vpc-id
      SecurityGroupEgress: []
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-central-sg"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Owner
          Value: !Ref Owner
        - Key: Environment
          Value: !Ref Environment

  ECGSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${ProjectName}-ecg-sg"
      GroupDescription: Security group for ECG ECS service
      VpcId: !ImportValue say2-6team-vpc-id
      SecurityGroupEgress: []
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-ecg-sg"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Owner
          Value: !Ref Owner
        - Key: Environment
          Value: !Ref Environment

  CXRSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${ProjectName}-cxr-sg"
      GroupDescription: Security group for CXR ECS service
      VpcId: !ImportValue say2-6team-vpc-id
      SecurityGroupEgress: []
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-cxr-sg"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Owner
          Value: !Ref Owner
        - Key: Environment
          Value: !Ref Environment

  LABSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${ProjectName}-lab-sg"
      GroupDescription: Security group for LAB ECS service
      VpcId: !ImportValue say2-6team-vpc-id
      SecurityGroupEgress: []
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-lab-sg"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Owner
          Value: !Ref Owner
        - Key: Environment
          Value: !Ref Environment

  RAGSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${ProjectName}-rag-sg"
      GroupDescription: Security group for RAG API service
      VpcId: !ImportValue say2-6team-vpc-id
      SecurityGroupEgress: []
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-rag-sg"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Owner
          Value: !Ref Owner
        - Key: Environment
          Value: !Ref Environment

  RouterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${ProjectName}-router-sg"
      GroupDescription: Security group for Router service (stateless fallback)
      VpcId: !ImportValue say2-6team-vpc-id
      SecurityGroupEgress: []
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-router-sg"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Owner
          Value: !Ref Owner
        - Key: Environment
          Value: !Ref Environment

  ChromaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${ProjectName}-chroma-sg"
      GroupDescription: Security group for ChromaDB or Vector DB service
      VpcId: !ImportValue say2-6team-vpc-id
      SecurityGroupEgress: []
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-chroma-sg"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Owner
          Value: !Ref Owner
        - Key: Environment
          Value: !Ref Environment

  HAPISecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${ProjectName}-hapi-sg"
      GroupDescription: Security group for HAPI FHIR EC2 service
      VpcId: !ImportValue say2-6team-vpc-id
      SecurityGroupEgress: []
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-hapi-sg"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Owner
          Value: !Ref Owner
        - Key: Environment
          Value: !Ref Environment

  AuroraSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${ProjectName}-aurora-sg"
      GroupDescription: Security group for Aurora PostgreSQL
      VpcId: !ImportValue say2-6team-vpc-id
      SecurityGroupEgress: []
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-aurora-sg"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Owner
          Value: !Ref Owner
        - Key: Environment
          Value: !Ref Environment

  ###########################################################################
  # SG Ingress Rules
  ###########################################################################
  ALBIngressHTTPS:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ALBSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: 0.0.0.0/0
      Description: Allow HTTPS to ALB. TODO hardening - restrict to origin-facing prefix list if required.

  CentralIngressFromALB:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref CentralSecurityGroup
      IpProtocol: tcp
      FromPort: 8000
      ToPort: 8000
      SourceSecurityGroupId: !Ref ALBSecurityGroup
      Description: ALB to orchestrator FastAPI

  ECGIngressFromCentral:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ECGSecurityGroup
      IpProtocol: tcp
      FromPort: 8001
      ToPort: 8001
      SourceSecurityGroupId: !Ref CentralSecurityGroup
      Description: Orchestrator to ECG service

  CXRIngressFromCentral:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref CXRSecurityGroup
      IpProtocol: tcp
      FromPort: 8002
      ToPort: 8002
      SourceSecurityGroupId: !Ref CentralSecurityGroup
      Description: Orchestrator to CXR service

  LABIngressFromCentral:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref LABSecurityGroup
      IpProtocol: tcp
      FromPort: 8003
      ToPort: 8003
      SourceSecurityGroupId: !Ref CentralSecurityGroup
      Description: Orchestrator to LAB service

  RAGIngressFromCentral:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RAGSecurityGroup
      IpProtocol: tcp
      FromPort: 8000
      ToPort: 8000
      SourceSecurityGroupId: !Ref CentralSecurityGroup
      Description: Orchestrator to RAG API service

  ChromaIngressFromRAG:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ChromaSecurityGroup
      IpProtocol: tcp
      FromPort: 8000
      ToPort: 8000
      SourceSecurityGroupId: !Ref RAGSecurityGroup
      Description: RAG service to ChromaDB or Vector DB service

  HAPIIngressFromCentral:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref HAPISecurityGroup
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      SourceSecurityGroupId: !Ref CentralSecurityGroup
      Description: Orchestrator to HAPI FHIR

  AuroraIngressFromCentral:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref AuroraSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref CentralSecurityGroup
      Description: Orchestrator to Aurora PostgreSQL

  AuroraIngressFromHAPI:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref AuroraSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref HAPISecurityGroup
      Description: HAPI to Aurora PostgreSQL

  # Router SG ingress rules
  RouterIngressFromALB:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RouterSecurityGroup
      IpProtocol: tcp
      FromPort: 8004
      ToPort: 8004
      SourceSecurityGroupId: !Ref ALBSecurityGroup
      Description: ALB to router service

  ECGIngressFromRouter:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ECGSecurityGroup
      IpProtocol: tcp
      FromPort: 8001
      ToPort: 8001
      SourceSecurityGroupId: !Ref RouterSecurityGroup
      Description: Router to ECG service (fallback)

  CXRIngressFromRouter:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref CXRSecurityGroup
      IpProtocol: tcp
      FromPort: 8002
      ToPort: 8002
      SourceSecurityGroupId: !Ref RouterSecurityGroup
      Description: Router to CXR service (fallback)

  LABIngressFromRouter:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref LABSecurityGroup
      IpProtocol: tcp
      FromPort: 8003
      ToPort: 8003
      SourceSecurityGroupId: !Ref RouterSecurityGroup
      Description: Router to LAB service (fallback)

  RAGIngressFromRouter:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RAGSecurityGroup
      IpProtocol: tcp
      FromPort: 8000
      ToPort: 8000
      SourceSecurityGroupId: !Ref RouterSecurityGroup
      Description: Router to RAG service (fallback)

  # Modal/RAG direct Aurora access
  AuroraIngressFromRAG:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref AuroraSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref RAGSecurityGroup
      Description: RAG service to Aurora PostgreSQL (for narrative storage)

  AuroraIngressFromECG:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref AuroraSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref ECGSecurityGroup
      Description: ECG service to Aurora PostgreSQL (direct inference result write)

  AuroraIngressFromCXR:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref AuroraSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref CXRSecurityGroup
      Description: CXR service to Aurora PostgreSQL (direct inference result write)

  AuroraIngressFromLAB:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref AuroraSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref LABSecurityGroup
      Description: LAB service to Aurora PostgreSQL (direct inference result write)

  ###########################################################################
  # SG Egress Rules
  ###########################################################################
  ALBEgressToCentral:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref ALBSecurityGroup
      IpProtocol: tcp
      FromPort: 8000
      ToPort: 8000
      DestinationSecurityGroupId: !Ref CentralSecurityGroup
      Description: ALB to orchestrator

  ALBEgressToRouter:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref ALBSecurityGroup
      IpProtocol: tcp
      FromPort: 8004
      ToPort: 8004
      DestinationSecurityGroupId: !Ref RouterSecurityGroup
      Description: ALB to router service

  CentralEgressToECG:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref CentralSecurityGroup
      IpProtocol: tcp
      FromPort: 8001
      ToPort: 8001
      DestinationSecurityGroupId: !Ref ECGSecurityGroup
      Description: Orchestrator to ECG

  CentralEgressToCXR:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref CentralSecurityGroup
      IpProtocol: tcp
      FromPort: 8002
      ToPort: 8002
      DestinationSecurityGroupId: !Ref CXRSecurityGroup
      Description: Orchestrator to CXR

  CentralEgressToLAB:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref CentralSecurityGroup
      IpProtocol: tcp
      FromPort: 8003
      ToPort: 8003
      DestinationSecurityGroupId: !Ref LABSecurityGroup
      Description: Orchestrator to LAB

  CentralEgressToRAG:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref CentralSecurityGroup
      IpProtocol: tcp
      FromPort: 8000
      ToPort: 8000
      DestinationSecurityGroupId: !Ref RAGSecurityGroup
      Description: Orchestrator to RAG API service

  CentralEgressToHAPI:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref CentralSecurityGroup
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      DestinationSecurityGroupId: !Ref HAPISecurityGroup
      Description: Orchestrator to HAPI

  CentralEgressToAurora:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref CentralSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      DestinationSecurityGroupId: !Ref AuroraSecurityGroup
      Description: Orchestrator to Aurora

  CentralEgressToEndpoints:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref CentralSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      DestinationSecurityGroupId: !ImportValue say2-6team-endpoints-sg
      Description: Orchestrator to Interface VPC Endpoints

  CentralEgressHTTPSForS3Gateway:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref CentralSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: 0.0.0.0/0
      Description: HTTPS egress for S3 Gateway Endpoint during dev

  ECGEgressToEndpoints:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref ECGSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      DestinationSecurityGroupId: !ImportValue say2-6team-endpoints-sg
      Description: ECG to Interface VPC Endpoints

  ECGEgressToAurora:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref ECGSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      DestinationSecurityGroupId: !Ref AuroraSecurityGroup
      Description: ECG service to Aurora PostgreSQL (direct inference result write)

  CXREgressToEndpoints:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref CXRSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      DestinationSecurityGroupId: !ImportValue say2-6team-endpoints-sg
      Description: CXR to Interface VPC Endpoints

  CXREgressToAurora:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref CXRSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      DestinationSecurityGroupId: !Ref AuroraSecurityGroup
      Description: CXR service to Aurora PostgreSQL (direct inference result write)

  LABEgressToEndpoints:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref LABSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      DestinationSecurityGroupId: !ImportValue say2-6team-endpoints-sg
      Description: LAB to Interface VPC Endpoints

  LABEgressToAurora:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref LABSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      DestinationSecurityGroupId: !Ref AuroraSecurityGroup
      Description: LAB service to Aurora PostgreSQL (direct inference result write)

  ECGEgressHTTPSForS3Gateway:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref ECGSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: 0.0.0.0/0
      Description: ECG HTTPS egress for S3 Gateway Endpoint during dev

  CXREgressHTTPSForS3Gateway:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref CXRSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: 0.0.0.0/0
      Description: CXR HTTPS egress for S3 Gateway Endpoint during dev

  LABEgressHTTPSForS3Gateway:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref LABSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: 0.0.0.0/0
      Description: LAB HTTPS egress for S3 Gateway Endpoint during dev

  RAGEgressToChroma:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref RAGSecurityGroup
      IpProtocol: tcp
      FromPort: 8000
      ToPort: 8000
      DestinationSecurityGroupId: !Ref ChromaSecurityGroup
      Description: RAG service to ChromaDB or Vector DB service

  RAGEgressToEndpoints:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref RAGSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      DestinationSecurityGroupId: !ImportValue say2-6team-endpoints-sg
      Description: RAG to Interface VPC Endpoints for Bedrock embedding and Secrets Manager and KMS and CloudWatch Logs

  RAGEgressHTTPSForS3Gateway:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref RAGSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: 0.0.0.0/0
      Description: RAG HTTPS egress for S3 Gateway Endpoint during dev

  RAGEgressToAurora:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref RAGSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      DestinationSecurityGroupId: !Ref AuroraSecurityGroup
      Description: RAG service to Aurora PostgreSQL (for narrative storage)

  ChromaEgressToEndpoints:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref ChromaSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      DestinationSecurityGroupId: !ImportValue say2-6team-endpoints-sg
      Description: ChromaDB to Interface VPC Endpoints for logs/secrets if needed

  ChromaEgressHTTPSForS3Gateway:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref ChromaSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: 0.0.0.0/0
      Description: ChromaDB HTTPS egress for S3 backup/snapshot during dev

  HAPIEgressToAurora:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref HAPISecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      DestinationSecurityGroupId: !Ref AuroraSecurityGroup
      Description: HAPI to Aurora PostgreSQL

  HAPIEgressToEndpoints:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref HAPISecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      DestinationSecurityGroupId: !ImportValue say2-6team-endpoints-sg
      Description: HAPI to Interface VPC Endpoints for logs/secrets if needed

  # Router egress rules
  RouterEgressToECG:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref RouterSecurityGroup
      IpProtocol: tcp
      FromPort: 8001
      ToPort: 8001
      DestinationSecurityGroupId: !Ref ECGSecurityGroup
      Description: Router to ECG service

  RouterEgressToCXR:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref RouterSecurityGroup
      IpProtocol: tcp
      FromPort: 8002
      ToPort: 8002
      DestinationSecurityGroupId: !Ref CXRSecurityGroup
      Description: Router to CXR service

  RouterEgressToLAB:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref RouterSecurityGroup
      IpProtocol: tcp
      FromPort: 8003
      ToPort: 8003
      DestinationSecurityGroupId: !Ref LABSecurityGroup
      Description: Router to LAB service

  RouterEgressToRAG:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref RouterSecurityGroup
      IpProtocol: tcp
      FromPort: 8000
      ToPort: 8000
      DestinationSecurityGroupId: !Ref RAGSecurityGroup
      Description: Router to RAG service

  RouterEgressToEndpoints:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref RouterSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      DestinationSecurityGroupId: !ImportValue say2-6team-endpoints-sg
      Description: Router to Interface VPC Endpoints (Bedrock, Secrets Manager)

  RouterEgressHTTPSForS3Gateway:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref RouterSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: 0.0.0.0/0
      Description: Router HTTPS egress for S3 Gateway Endpoint during dev

  ###########################################################################
  # IAM Roles
  #
  # Secrets Manager strategy:
  #   - This stack does NOT create DB Secret resources.
  #   - data-stack should create/export the Aurora Secret ARN.
  #   - During dev, task roles allow GetSecretValue on say2-6team/* secrets.
  #   - After data-stack exports exact Secret ARNs, replace prefix wildcard
  #     with exact ARNs for least privilege.
  #
  # S3 strategy:
  #   - During dev, task roles allow access to S3 buckets matching
  #     say2-6team-*.
  #   - After data-stack exports exact bucket ARNs, replace wildcard resources
  #     with exact bucket ARNs.
  #
  # Bedrock strategy:
