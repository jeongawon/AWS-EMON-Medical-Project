<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>EMON Med® — iPhone Preview</title>
  <style>
    :root {
      /* iPhone 15 Pro logical screen */
      --screen-w: 393px;
      --screen-h: 852px;
      --bezel: 13px;
      --screen-radius: 50px;
      --device-radius: 63px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(1200px 800px at 50% -10%, #2a2440 0%, transparent 60%),
        linear-gradient(160deg, #0e0e12 0%, #16161c 100%);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ---- Device frame ---- */
    .device {
      position: relative;
      width: calc(var(--screen-w) + var(--bezel) * 2);
      height: calc(var(--screen-h) + var(--bezel) * 2);
      border-radius: var(--device-radius);
      /* titanium-ish edge */
      background: linear-gradient(145deg, #3a3a3e 0%, #1d1d20 35%, #0c0c0e 65%, #2c2c30 100%);
      padding: var(--bezel);
      box-shadow:
        0 2px 4px rgba(255, 255, 255, 0.12) inset,
        0 0 0 1px rgba(0, 0, 0, 0.6),
        0 40px 80px -20px rgba(0, 0, 0, 0.75),
        0 20px 40px -10px rgba(0, 0, 0, 0.55);
      transform-origin: center center;
    }

    /* ---- Screen ---- */
    .screen {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: var(--screen-radius);
      overflow: hidden;
      background: #000;
    }

    /* App fills the whole screen (edge-to-edge, under the status bar) */
    .iframe-wrap { position: absolute; inset: 0; }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #F8FAFC;
    }

    /* iOS status bar — TRANSPARENT overlay so it always blends with the
       page behind it (purple app bar OR the login hero). pointer-events:none
       lets taps pass through to the app. */
    .statusbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      color: #fff;
      z-index: 5;
      pointer-events: none;
    }
    .statusbar .time {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
    }
    .statusbar .indicators {
      display: flex;
      align-items: center;
      gap: 6px;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.25));
    }

    /* Dynamic Island */
    .island {
      position: absolute;
      top: 9px;
      left: 50%;
      transform: translateX(-50%);
      width: 122px;
      height: 35px;
      background: #000;
      border-radius: 20px;
      z-index: 6;
    }

    /* Home indicator */
    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      height: 5px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.55);
      mix-blend-mode: difference;
      z-index: 5;
      pointer-events: none;
    }

    /* ---- Side buttons ---- */
    .btn {
      position: absolute;
      background: linear-gradient(180deg, #2a2a2e, #161618);
      box-shadow: 0 1px 1px rgba(255,255,255,0.08) inset, -1px 0 2px rgba(0,0,0,0.5);
    }
    .btn.left  { left: -2px;  border-radius: 2px 0 0 2px; width: 3px; }
    .btn.right { right: -2px; border-radius: 0 2px 2px 0; width: 3px; }
    .btn.silent { top: 118px; height: 28px; }
    .btn.vup    { top: 165px; height: 56px; }
    .btn.vdown  { top: 235px; height: 56px; }
    .btn.power  { top: 200px; height: 86px; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="device" id="device">
      <div class="btn left silent"></div>
      <div class="btn left vup"></div>
      <div class="btn left vdown"></div>
      <div class="btn right power"></div>

      <div class="screen">
        <div class="iframe-wrap">
          <iframe src="index.html?frame=ios" title="EMON Med App"
                  allow="microphone; clipboard-read; clipboard-write"></iframe>
        </div>

        <!-- Transparent status bar overlay -->
        <div class="statusbar">
          <span class="time" id="clock">9:41</span>
          <div class="indicators">
            <!-- cellular -->
            <svg width="18" height="12" viewBox="0 0 18 12" fill="none">
              <rect x="0"  y="8" width="3" height="4"  rx="1" fill="#fff"/>
              <rect x="5"  y="6" width="3" height="6"  rx="1" fill="#fff"/>
              <rect x="10" y="3" width="3" height="9"  rx="1" fill="#fff"/>
              <rect x="15" y="0" width="3" height="12" rx="1" fill="#fff"/>
            </svg>
            <!-- wifi -->
            <svg width="17" height="12" viewBox="0 0 17 12" fill="#fff">
              <path d="M8.5 2.2c2.7 0 5.2 1 7 2.8l-1.5 1.5a7.8 7.8 0 0 0-11 0L1.5 5C3.3 3.2 5.8 2.2 8.5 2.2Z"/>
              <path d="M8.5 6c1.5 0 2.9.6 3.9 1.6l-1.6 1.6a3.3 3.3 0 0 0-4.6 0L4.6 7.6A5.5 5.5 0 0 1 8.5 6Z"/>
              <circle cx="8.5" cy="10.4" r="1.4"/>
            </svg>
            <!-- battery -->
            <svg width="27" height="13" viewBox="0 0 27 13" fill="none">
              <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#fff" stroke-opacity="0.6"/>
              <rect x="2" y="2" width="16" height="9" rx="2" fill="#fff"/>
              <path d="M24.5 4.5v4c0.9-0.4 0.9-3.6 0-4Z" fill="#fff" fill-opacity="0.6"/>
            </svg>
          </div>
        </div>

        <div class="island"></div>
        <div class="home-indicator"></div>
      </div>
    </div>
  </div>

  <script>
    // Scale the whole device down to fit the browser window (like a mirroring window).
    var device = document.getElementById('device');
    function fit() {
      var pad = 32;
      var dw = device.offsetWidth, dh = device.offsetHeight;
      var s = Math.min(
        1,
        (window.innerWidth - pad) / dw,
        (window.innerHeight - pad) / dh
      );
      device.style.transform = 'scale(' + s + ')';
    }
    window.addEventListener('resize', fit);
    fit();

    // Live clock in the status bar.
    function tick() {
      var d = new Date();
      var h = d.getHours(), m = d.getMinutes();
      document.getElementById('clock').textContent =
        h + ':' + (m < 10 ? '0' + m : m);
    }
    tick();
    setInterval(tick, 10000);
  </script>
</body>
</html>
