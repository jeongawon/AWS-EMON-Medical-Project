version: "3.8"

services:
  # ────────────────────────────────────────────────────────
  # PostgreSQL: 같은 인스턴스에 2개 database (hapi + central_db)
  # ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hapi            # HAPI FHIR 전용 (자동 생성)
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - pg-data:/var/lib/postgresql/data
      # 최초 기동 시 init-db.sh가 실행되어 central_db database 생성 + 스키마 적용
      # schema.sql은 /init/에 두고 init-db.sh에서만 central_db에 적용
      # (만약 /docker-entrypoint-initdb.d/에 두면 hapi DB에도 자동 적용되어 오염됨)
      - ./init-db.sh:/docker-entrypoint-initdb.d/10-init-db.sh
      - ../backend/app/db/schema.sql:/init/schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ────────────────────────────────────────────────────────
  # HAPI FHIR: hapi database만 사용 (central_db는 관여 X)
  # ────────────────────────────────────────────────────────
  hapi-fhir:
    image: hapiproject/hapi:latest
    ports:
      - "8080:8080"
    environment:
      - spring.datasource.url=jdbc:postgresql://postgres:5432/hapi
      - spring.datasource.username=admin
      - spring.datasource.password=secret
      - spring.datasource.driverClassName=org.postgresql.Driver
      - spring.jpa.properties.hibernate.dialect=ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
      - hapi.fhir.fhir_version=R4
      - hapi.fhir.validation.requests_enabled=false
    depends_on:
      postgres:
        condition: service_healthy

  # ────────────────────────────────────────────────────────
  # 중앙백엔드: FHIR(HTTP) + central_db(asyncpg) 둘 다 접근
  # ────────────────────────────────────────────────────────
  backend:
    build: ../backend
    ports:
      - "8000:8000"
    environment:
      - FHIR_BASE_URL=http://hapi-fhir:8080/fhir
      - OPS_DB_URL=postgresql://admin:secret@postgres:5432/central_db
      - AWS_REGION=ap-northeast-2
      # 모달 서비스 URL — EC2 52.79.251.216 (t3.large) 한 인스턴스에 3개 모달 분리 호스팅
      # ECG/CXR/LAB 각자 별도 서비스. LAB은 룰 기반 실시간(/predict) + 6h 악화 예측(/predict_6h) 둘 다 포함.
      - LAB_SERVICE_URL=http://52.79.251.216:8000
      - BLOOD_PROGNOSIS_URL=http://52.79.251.216:8000   # 같은 LAB 모달의 /predict_6h endpoint
      - CXR_SERVICE_URL=http://52.79.251.216:8002
      - ECG_SERVICE_URL=http://52.79.251.216:8003
      # FCM 푸시 — fcm-sa.json 마운트 경로 (없으면 fcm.init()가 graceful no-op)
      - GOOGLE_APPLICATION_CREDENTIALS=/app/fcm-sa.json
    volumes:
      # AWS 자격증명 마운트 (CXR S3 다운로드, MIMIC labevents S3 Select용)
      - ${HOME}/.aws:/root/.aws:ro
      # FCM 서비스 계정 키 (read-only) — Firebase Admin SDK 인증용
      - ../backend/fcm-sa.json:/app/fcm-sa.json:ro
    depends_on:
      hapi-fhir:
        condition: service_started
      postgres:
        condition: service_healthy

  # ────────────────────────────────────────────────────────
  # pgweb: PostgreSQL web GUI (개발/디버그용)
  # http://localhost:8081 에서 central_db 즉시 조회.
  # 다른 DB(hapi)는 좌상단 [Connect] → URL 변경으로 전환 가능.
  # ────────────────────────────────────────────────────────
  pgweb:
    image: sosedoff/pgweb
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: "postgres://admin:secret@postgres:5432/central_db?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg-data:
